<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="web/assets/styles/base.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body class="p-3">
    <div class="card p-3 shadow-sm">
        <div class="d-flex flex-row align-items-center justify-content-between">
            <p class="title m-0">Categoria</p>
            <select class="form-select w-auto">
                <option value="in">Entradas</option>
                <option value="out">Saídas</option>
            </select>
        </div>
        <canvas id="canvas-chart" class="p-3"></canvas>
    </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('canvas-chart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: [
            'Transporte',
            'Alimentação',
            'Outros'
        ],
        datasets: [{
            data: [300, 50, 100],
            backgroundColor: [
                'rgb(22, 51, 74)',
                'rgb(47, 86, 117)',
                'rgb(60, 115, 158)',
                'rgb(89, 139, 179)',
                'rgb(112, 159, 196)',
                'rgb(135, 185, 224)',
                'rgb(131, 199, 252)',
                'rgb(171, 213, 245)',
                'rgb(200, 227, 247)',
                
            ],
        }]
    },
    options: {
        plugins: {
            tooltip: {
                callbacks: {
                    // Customiza o texto que aparece dentro da tooltip
                    label: function(context) {
                        // Formata o número como moeda Real (R$)
                        return context.parsed.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    }
                }
            }
        }
    }
});
</script>

</html>
