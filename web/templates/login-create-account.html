{% extends 'login.html' %}

{% load static %}

{% block login_content %}
<div class="d-grid row-gap-3">
    <div>
        <label for="inp-username" class="form-label">Usuário</label>
        <input type="text" class="form-control"name="username" id="inp-username">
    </div>
    <div class="d-flex">
        <div class="me-3">
            <label for="inp-password" class="form-label">Senha</label>
            <input type="password" class="form-control" name="password" id="inp-password">
        </div>
        <div>
            <label for="inp-password-confirm" class="form-label">Confirmar Senha</label>
            <input type="password" class="form-control" name="password_confirm" id="inp-password-confirm">
        </div>
    </div>
    <div>
        <label for="inp-email" class="form-label">E-mail</label>
        <input type="email" class="form-control" name="email" id="inp-email">
    </div>
    <div class="d-flex">
        <div class="me-3">
            <label for="inp-first-name" class="form-label">Primeiro Nome</label>
            <input type="text" class="form-control" name="first_name" id="inp-first-name">
        </div>
        <div>
            <label for="inp-last-name" class="form-label">Último Nome</label>
            <input type="text" class="form-control" name="last_name" id="inp-last-name" onkeydown="if (event.key === 'Enter') document.getElementById('btn-create').click()">
        </div>
    </div>
</div>
<div class="d-flex div-links">
    <p class="mb-0 me-1">Já possui uma conta?</p>
    <a href="/login">acesse aqui</a>
</div>
<button class="btn primary" id="btn-create">criar conta</button>
{% endblock %}
