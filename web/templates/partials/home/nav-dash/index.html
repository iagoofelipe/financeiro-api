{% load static %}

<div class="container-dash d-flex flex-column row-gap-3">
    <div class="top-cards card shadow-sm overflow-auto p-3">
        <div class="ms-auto me-auto w-80 d-flex column-gap-4 justify-content-between" style="min-width: 80%;">
            <div class="d-flex">
                <img src="{% static 'imgs/money-in.svg' %}">
                <div class="ms-2 d-flex flex-column justify-content-center">
                    <span class="title-3-bold">Entradas</span>
                    <div>
                        <span class="title-3-bold">R$</span>
                        <span class="title value-in"></span>
                    </div>
                    <div class="value-in-note">
                        <img src="{% static 'imgs/icons/not-progress.svg' %}" class="icon-not-progress" hidden>
                        <img src="{% static 'imgs/icons/progress.svg' %}" class="icon-progress" hidden>
                        <span class="title-3-bold text"></span>
                    </div>
                </div>
            </div>
            <div class="d-flex">
                <img src="{% static 'imgs/money-out.svg' %}">
                <div class="ms-2 d-flex flex-column justify-content-center">
                    <span class="title-3-bold">Saídas</span>
                    <div>
                        <span class="title-3-bold">R$</span>
                        <span class="title value-out"></span>
                    </div>
                    <div class="value-out-note">
                        <img src="{% static 'imgs/icons/not-progress.svg' %}" class="icon-not-progress" hidden>
                        <img src="{% static 'imgs/icons/progress.svg' %}" class="icon-progress" hidden>
                        <span class="title-3-bold text"></span>
                    </div>
                </div>
            </div>
            <div class="d-flex">
                <img src="{% static 'imgs/balance.svg' %}">
                <div class="ms-2 d-flex flex-column justify-content-center">
                    <span class="title-3-bold">Saldo</span>
                    <div>
                        <span class="title-3-bold">R$</span>
                        <span class="title value-balance"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row-gap-3 d-flex flex-row column-gap-3">
        <div id="chart-category" style="width: 400px;"></div>
        <div class="card p-3 shadow-sm row-gap-3" style="width: 400px;">
            <div class="d-flex flex-row align-items-top justify-content-between">
                <span class="title">Cartões</span>
                <select class="form-select w-auto select-card">
                    {% for card in cards %}
                    <option value="{{ card.id }}">{{ card.name }}</option>
                    {% endfor %}
                </select>
            </div>

                <div style="height: 30px;" class="d-flex">

            <div class="field-card-limit">

            <div class="field-card-accounted">
                <p class="m-0 fw-semibold">Valores Contabilizados</p>
                <span class="text">-</span>
            </div>
            <div class="field-card-pending">
                <p class="m-0 fw-semibold">Lançamentos Pendentes</p>
                <span class="text">-</span>
            </div>
            <div class="field-card-closing-date">
                <p class="m-0 fw-semibold">Fechamento</p>
                <span class="text">-</span>
            </div>
            <div class="field-card-due-date">
                <p class="m-0 fw-semibold">Vencimento</p>
                <span class="text">-</span>
            </div>
