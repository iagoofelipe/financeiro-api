<div class="card p-3 shadow-sm ms-3 reg-details h-100" id="{CONTAINER_ID}">
    <div class="d-flex justify-content-between align-items-center">
        <div id="{FIELD_TITLE_ID}">
            <p class="text m-0 title-2">Saída Cartão</p>
        </div>
        <div class="d-flex">
            <button class="btn btn-outline ms-3">{% include 'icons/plus.svg' %}</button>
            <button class="btn btn-outline ms-3"><i class="bi bi-pencil-square"></i></button>
            <button id="{BTN_HIDE_ID}" class="btn btn-outline ms-3">{% include 'icons/panel-right-filled.svg' %}</button>
        </div>
    </div>
    <div id="{FIELD_TYPE_ID}">
        <p class="m-0 fw-semibold">Tipo</p>
        <p class="text">Saída Cartão</p>
    </div>
    <div id="{FIELD_VALUE_ID}">
        <p class="m-0 fw-semibold">Valor</p>
        <p class="text">R$ 187,41</p>
    </div>
    <div id="{FIELD_OWNER_ID}">
        <p class="m-0 fw-semibold">Responsável</p>
        <p class="text">Brunna Carvalho</p>
    </div>
    <div id="{FIELD_OCCURRENCE_ID}">
        <p class="m-0 fw-semibold">Data de Ocorrência</p>
        <p class="text">20 Jan 26, 08h10</p>
    </div>
    <div id="{FIELD_DESCRIPTION_ID}">
        <p class="m-0 fw-semibold">Descrição</p>
        <p class="text">Televisão parcelada</p>
    </div>
    <div id="{FIELD_STATUS_ID}">
        <p class="m-0 fw-semibold">Status</p>
        <div class="text"></div>
    </div>
    <hr>
    <div id="{FIELD_CARD_ID}">
        <p class="m-0 fw-semibold">Cartão</p>
        <p class="text">Nubank</p>
    </div>

</div>
